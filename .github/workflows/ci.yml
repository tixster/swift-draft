name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift 6.3 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install Swift
        uses: SwiftyLab/setup-swift@38f54a76b70d989321de9dc7c840618c08cf56e9 # v1.14.0
        with:
          swift-version: "6.3"
      - name: Show toolchain
        run: swift --version
      - name: Test
        run: swift test
      - name: Release build
        run: swift build -c release
