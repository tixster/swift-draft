name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Swift 6.3.3 on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - name: Install Swift
        uses: swift-actions/setup-swift@65540b95f51493d65f5e59e97dcef9629ddf11bf
        with:
          swift-version: "6.3.3"
      - name: Show toolchain
        run: swift --version
      - name: Test
        run: swift test
      - name: Release build
        run: swift build -c release
